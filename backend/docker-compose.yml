version: '3.8'
services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: chickpea-backend
    container_name: chickpea-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - chickpea-network
    ports:
      - "8000:8000" 
    command: php artisan serve --host=0.0.0.0 --port=8000

  worker:
    image: chickpea-backend
    container_name: chickpea-worker
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - chickpea-network
    depends_on:
      - db
      - app
    command: php artisan queue:work --verbose --tries=3

  db:
    image: mysql:8.0
    container_name: chickpea-db
    restart: unless-stopped
    tty: true
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: chickpea_db
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./docker-data/mysql:/var/lib/mysql
    networks:
      - chickpea-network

networks:
  chickpea-network:
    driver: bridge