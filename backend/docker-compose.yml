version: '3.8'
services:

  # PHP Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: chickpea-backend
    container_name: chickpea-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - chickpea-network

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: chickpea-db
    restart: unless-stopped
    tty: true
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: chickpea_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_PASSWORD: user_password
      MYSQL_USER: busani
    volumes:
      - ./docker-data/mysql:/var/lib/mysql
    networks:
      - chickpea-network

networks:
  chickpea-network:
    driver: bridge